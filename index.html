<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One: QR & Summary Pro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3242/3242202.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-green: #e8f5e9;
            --mint-dark: #a5d6a7;
            --accent-green: #66bb6a;
            --deep-green: #2d6a4f;
            --tmn-dark: #2d3436;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
            min-height: 100vh;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(165, 214, 167, 0.2);
            width: 100%; max-width: 500px;
        }

        /* --- แถบเมนู (Tabs) --- */
        .tab-menu {
            display: flex;
            background: #f1f8f4;
            padding: 8px;
            border-radius: 20px;
            margin-bottom: 25px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Kanit';
            font-weight: 500;
            color: #7f8c8d;
            background: transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: var(--deep-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI ส่วนกลาง --- */
        h2 { text-align: center; color: var(--deep-green); font-size: 20px; margin-top: 0; }
        
        textarea {
            width: 100%; height: 150px;
            border: 2px solid var(--pastel-green);
            border-radius: 15px; padding: 15px;
            font-family: 'Kanit'; font-size: 14px;
            resize: none; outline: none; margin-bottom: 10px;
        }

        .drop-zone {
            border: 2px dashed var(--mint-dark);
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer; border-radius: 20px;
            background: #f9fdf9; color: #666;
            text-align: center; transition: 0.3s;
        }

        .drop-zone:hover { border-color: var(--accent-green); background: #f1f8f4; }

        #preview {
            max-width: 100%; border-radius: 15px;
            display: none; margin-bottom: 20px;
            border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-main {
            background: var(--accent-green); color: white;
            border: none; padding: 15px; border-radius: 15px;
            width: 100%; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        .btn-main:hover { background: var(--deep-green); transform: translateY(-2px); }

        .result-area {
            background: #f1f8f4; border-radius: 20px;
            padding: 20px; border: 1px solid #e0eee0; margin-top: 20px;
        }

        .final-text {
            background: #fff; border: 1px dashed var(--mint-dark);
            padding: 15px; border-radius: 12px;
            white-space: pre-wrap; font-size: 16px; color: #333; margin-bottom: 15px;
        }

        /* สำหรับหน้า QR */
        .qr-card {
            background: var(--tmn-dark); color: white;
            padding: 20px; border-radius: 20px; text-align: left;
        }
        .qr-label { color: #95a5a6; font-size: 12px; margin-bottom: 8px; }
        .qr-number { font-size: 24px; font-family: monospace; color: #55efc4; font-weight: bold; margin-bottom: 15px; }

        .btn-copy {
            background: var(--deep-green); color: white;
            border: none; padding: 12px; border-radius: 12px;
            width: 100%; cursor: pointer; font-size: 14px;
        }

        #status { text-align: center; font-size: 13px; color: #7f8c8d; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('summary-page', this)">📊 สรุปยอดเงิน</button>
        <button class="tab-btn" onclick="switchTab('qr-page', this)">🔍 สแกน QR Code</button>
    </div>

    <div id="summary-page" class="page active">
        <h2>🧧 สรุปยอด (No Limits)</h2>
        <textarea id="raw-input" placeholder="วางข้อความจากแชทที่นี่..."></textarea>
        <button class="btn-main" onclick="calculateFixed()">ประมวลผลยอดรวม</button>

        <div id="summary-result" class="result-area" style="display:none;">
            <div class="final-text" id="output-text"></div>
            <button class="btn-copy" onclick="copyText('output-text', this)">คัดลอกข้อความสรุป</button>
        </div>
    </div>

    <div id="qr-page" class="page">
        <h2>🔍 QR ID Extractor</h2>
        <div class="drop-zone" id="drop-zone">
            <span>คลิก หรือ <b>Ctrl+V</b> เพื่อวางรูป QR</span>
            <input type="file" id="qr-input" accept="image/*" style="display:none">
        </div>
        <img id="preview">

        <div id="qr-result" class="result-area" style="display:none;">
            <div class="qr-card">
                <div class="qr-label">WALLET ID (15 หลัก)</div>
                <div class="qr-number" id="id-number">Searching...</div>
                <button class="btn-copy" onclick="copyText('id-number', this)">คัดลอกตัวเลข</button>
            </div>
        </div>
        <div id="status">พร้อมใช้งาน</div>
    </div>
</div>

<script>
    // --- ระบบสลับ Tab ---
    function switchTab(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
    }

    // --- Logic 1: สรุปยอดเงิน (แก้บัคแล้ว) ---
    function calculateFixed() {
        const input = document.getElementById('raw-input').value;
        if (!input.trim()) return;

        const lines = input.split('\n');
        let totalIn = 0, totalOut = 0, totalPeople = 0;

        lines.forEach(line => {
            const txt = line.trim();
            if (!txt) return;
            const cleanLine = txt.replace(/,/g, '');
            const numbers = cleanLine.match(/\d+/g);

            if (txt.includes('总入款金额')) {
                if (numbers && numbers.length >= 2) {
                    totalIn += parseInt(numbers[numbers.length - 1]);
                    totalPeople += parseInt(numbers[numbers.length - 2]);
                }
            }
            if (txt.includes('出款')) {
                if (numbers) {
                    totalOut += parseInt(numbers[numbers.length - 1]);
                }
            }
        });

        const resultText = `🧧 凤凰集团 拜林最牛逼 🧧\n\n💰总入款金额  ${totalPeople} คน  : ${totalIn.toLocaleString()}\n💸出款   :  ${totalOut.toLocaleString()}`;
        document.getElementById('output-text').innerText = resultText;
        document.getElementById('summary-result').style.display = 'block';
    }

    // --- Logic 2: สแกน QR Code ---
    const qrInput = document.getElementById('qr-input');
    const dropZone = document.getElementById('drop-zone');
    const statusText = document.getElementById('status');

    dropZone.onclick = () => qrInput.click();
    qrInput.onchange = e => processImage(e.target.files[0]);
    document.onpaste = e => {
        const item = e.clipboardData.items[0];
        if (item && item.type.includes("image")) processImage(item.getAsFile());
    };

    function processImage(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { 
            const preview = document.getElementById('preview');
            preview.src = e.target.result; preview.style.display = 'block';
            dropZone.style.display = 'none';
        };
        reader.readAsDataURL(file);

        const html5QrCode = new Html5Qrcode("status"); 
        html5QrCode.scanFile(file, true)
            .then(decodedText => {
                let cleanData = decodedText.replace(/[^0-9]/g, '');
                let match = cleanData.match(/140\d{12}/) || cleanData.match(/\d{15}/);
                if (match) {
                    document.getElementById('id-number').innerText = match[0];
                    document.getElementById('qr-result').style.display = 'block';
                    statusText.innerText = "ดึงข้อมูลสำเร็จ";
                } else {
                    alert("ไม่พบเลข 15 หลัก");
                    resetQR();
                }
            })
            .catch(err => {
                alert("อ่าน QR ไม่สำเร็จ");
                resetQR();
            });
    }

    function resetQR() {
        document.getElementById('preview').style.display = 'none';
        dropZone.style.display = 'block';
        document.getElementById('qr-result').style.display = 'none';
        statusText.innerText = "พร้อมใช้งาน";
    }

    // --- ระบบคัดลอกส่วนกลาง ---
    function copyText(elementId, btn) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "คัดลอกแล้ว! ✓";
            setTimeout(() => btn.innerText = originalText, 1500);
        });
    }
</script>

</body>
</html>
